version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6
    container_name: construction-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: construction-company
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - construction-network

  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: ../Dockerfile.backend
    container_name: construction-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/construction-company
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - construction-network
    volumes:
      - ./server/uploads:/app/uploads

  # Frontend
  frontend:
    build:
      context: ./client
      dockerfile: ../Dockerfile.frontend
    container_name: construction-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - construction-network

volumes:
  mongodb_data:

networks:
  construction-network:
    driver: bridge
